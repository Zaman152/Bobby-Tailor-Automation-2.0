<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Sign In — Bobby Tailor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* ── Login layout ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-base);
      padding: 24px;
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo .logo {
      width: 44px;
      height: 44px;
      font-size: 18px;
    }

    .login-logo .brand-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .login-heading {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
    }

    .login-subheading {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 28px;
    }

    .login-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: var(--radius-sm);
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    .login-form .field {
      margin-bottom: 16px;
    }

    .login-form label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .login-form input[type="email"],
    .login-form input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-form input[type="email"]:focus,
    .login-form input[type="password"]:focus {
      border-color: var(--accent-primary);
    }

    .login-form input::placeholder {
      color: var(--text-tertiary);
    }

    .login-submit {
      width: 100%;
      padding: 11px;
      background: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
    }

    .login-submit:hover {
      background: #2563eb;
    }

    .login-submit:active {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo">BT</div>
        <span class="brand-name">Bobby Tailor</span>
      </div>

      <h1 class="login-heading">Sign in</h1>
      <p class="login-subheading">Estimation automation dashboard</p>

      {% if error %}
        <p class="login-error">{{ error }}</p>
      {% endif %}

      <form class="login-form" method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="username"
            placeholder="admin@bobbytailor.com"
          >
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="••••••••"
          >
        </div>

        <button type="submit" class="login-submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
